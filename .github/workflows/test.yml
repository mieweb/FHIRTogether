name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run build:server

      - run: npm run test:unit

  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm ci --prefix packages/fhir-scheduler

      - run: npm run build

      - run: npx playwright install --with-deps chromium

      - run: npm run test:e2e

      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

  scheduler-e2e:
    name: Scheduler Widget E2E
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm ci --prefix packages/fhir-scheduler

      - run: npm run build

      - run: npx playwright install --with-deps chromium
        working-directory: packages/fhir-scheduler

      - name: Start backend server
        run: |
          set -euo pipefail
          node dist/server.js > backend.log 2>&1 &
          echo $! > backend.pid

      - name: Wait for backend
        run: npx wait-on http://127.0.0.1:4010/health --timeout 120000

      - run: npm test
        working-directory: packages/fhir-scheduler

      - name: Stop backend server
        if: always()
        run: |
          if [ -f backend.pid ]; then kill "$(cat backend.pid)" || true; fi

      - name: Upload backend log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: backend-log
          path: backend.log

      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: scheduler-playwright-report
          path: packages/fhir-scheduler/playwright-report/
          retention-days: 14
