name: Build and Deploy Preview

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.image.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Delete failed container (if any)
        env:
          API_KEY: ${{ secrets.LAUNCHPAD_API_KEY }}
          API_URL: ${{ secrets.LAUNCHPAD_API_URL }}
        run: |
          REPO_NAME=$(basename "${{ github.repository }}")
          CONTAINER_NAME="${{ github.repository_owner }}-${REPO_NAME}-${{ github.head_ref }}"
          CONTAINER_NAME=${CONTAINER_NAME,,}
          CONTAINER_NAME=$(echo "$CONTAINER_NAME" | sed 's/[^a-z0-9-]/-/g')

          RESPONSE=$(curl -s -H "Authorization: Bearer $API_KEY" -H "Accept: application/json" \
            "$API_URL/sites/1/containers?hostname=$CONTAINER_NAME")
          CONTAINER_ID=$(echo "$RESPONSE" | jq -r '.containers[0].id // empty')
          CONTAINER_STATUS=$(echo "$RESPONSE" | jq -r '.containers[0].status // empty')

          if [[ -n "$CONTAINER_ID" && "$CONTAINER_STATUS" == "failed" ]]; then
            echo "Deleting failed container $CONTAINER_NAME (ID: $CONTAINER_ID)..."
            DELETE_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
              -X DELETE -H "Authorization: Bearer $API_KEY" \
              "$API_URL/sites/1/containers/$CONTAINER_ID")
            echo "DELETE response: $DELETE_CODE"
          else
            echo "No failed container to clean up (status: ${CONTAINER_STATUS:-none})."
          fi

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: image
        run: echo "tag=${{ env.REGISTRY }}/${{ github.repository_owner }}/fhirtogether:pr-${{ github.event.pull_request.number }}" | tr '[:upper:]' '[:lower:]' >> $GITHUB_OUTPUT

      - uses: docker/build-push-action@v6
        with:
          push: true
          tags: ${{ steps.image.outputs.tag }}

  deploy-preview:
    if: github.event.action != 'closed'
    needs: build-and-push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - id: preview
        name: Compute preview URL
        run: |
          REPO_NAME=$(basename "${{ github.repository }}")
          CONTAINER_NAME="${{ github.repository_owner }}-${REPO_NAME}-${{ github.head_ref }}"
          CONTAINER_NAME=${CONTAINER_NAME,,}
          CONTAINER_NAME=$(echo "$CONTAINER_NAME" | sed 's/[^a-z0-9-]/-/g')
          echo "container_name=${CONTAINER_NAME}" >> "$GITHUB_OUTPUT"
          echo "url=https://${CONTAINER_NAME}.os.mieweb.org" >> "$GITHUB_OUTPUT"

      - uses: mieweb/launchpad@main
        with:
          api_key: ${{ secrets.LAUNCHPAD_API_KEY }}
          api_url: ${{ secrets.LAUNCHPAD_API_URL }}
          services: '[{"type":"http","internalPort":4010}]'
          template_name: ${{ needs.build-and-push.outputs.image_tag }}

      - name: Comment preview URL on PR
        uses: actions/github-script@v7
        env:
          PREVIEW_URL: ${{ steps.preview.outputs.url }}
        with:
          script: |
            const marker = '<!-- preview-url-comment -->';
            const body = `${marker}
            Preview deployment is ready.

            URL: ${process.env.PREVIEW_URL}
            `;

            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;

            const { data: comments } = await github.rest.issues.listComments({
              owner,
              repo,
              issue_number,
              per_page: 100,
            });

            const existing = comments.find(
              (comment) =>
                comment.user?.type === 'Bot' &&
                typeof comment.body === 'string' &&
                comment.body.includes(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
              core.info('Updated existing preview comment.');
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
              core.info('Created new preview comment.');
            }

  cleanup-preview:
    if: github.event.action == 'closed'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: mieweb/launchpad@main
        with:
          api_key: ${{ secrets.LAUNCHPAD_API_KEY }}
          api_url: ${{ secrets.LAUNCHPAD_API_URL }}
