services:
  app:
    build: .
    init: true
    depends_on:
      - mongo
    ports:
      - "4010:4010"
    volumes:
      # Persist the database outside the container
      - ./data:/app/data
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - SQLITE_DB_PATH=/app/data/fhirtogether.db
      - MONGO_URI=mongodb://mongo:27017
      - MONGO_DB_NAME=fhirtogether
    command: npm run dev

  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data:
